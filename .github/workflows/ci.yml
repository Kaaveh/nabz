name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      # Pinned toolchain (SPEC-01, PRD §5). Xcode 16.3 → Swift 6.1.
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app
      - run: swift --version
      - run: swift build
      - run: swift test
      # Scripted smoke run (NFR-6): the TUI renders N frames against the simulated
      # source, then exits cleanly. NABZ_SMOKE_FRAMES is the no-pty CI hook (D-10);
      # a non-zero exit fails the job.
      - name: Simulate smoke run
        run: NABZ_SMOKE_FRAMES=30 swift run nabz > /dev/null
